services:
  postgres:
    image: postgres:16-alpine
    container_name: dddforum-postgres
    environment:
      POSTGRES_USER: dddforum
      POSTGRES_PASSWORD: dddforum
      POSTGRES_DB: dddforum
    ports:
      - "5432:5432"
    volumes:
      - dddforum_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dddforum -d dddforum"]
      interval: 3s
      timeout: 5s
      retries: 5

volumes:
  dddforum_pgdata:
